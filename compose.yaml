services:
  postgres:
    image: postgres:17
    container_name: vaadinstart-postgres
    environment:
      POSTGRES_DB: vaadinstart
      POSTGRES_USER: vaadinstart
      POSTGRES_PASSWORD: vaadinstart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: vaadinstart-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://vaadinstart:vaadinstart@postgres:5432/vaadinstart?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: vaadinstart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: vaadinstart-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data: